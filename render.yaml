services:
  - type: web
    name: reise-der-verlorenen
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: OPEN_VERSION_PASSWORD
        sync: false
      - key: TEACHER_DASHBOARD_PASSWORD
        sync: false
      - key: SEB_CONFIG_KEY_HASH
        sync: false
